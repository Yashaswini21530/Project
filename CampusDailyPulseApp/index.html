<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CampusDailyPulse | View</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <aside id="sidebar">
        <div class="logo">
            <div class="logo-icon"><i class="fas fa-heartbeat"></i></div>
            <span>CampusPulse</span>
        </div>
        <nav id="main-nav">
            <a href="#" class="nav-link active" data-view="dashboard"><i class="fas fa-chart-pie"></i> <span>Dashboard</span></a>
            <a href="#" class="nav-link" data-view="attendance"><i class="fas fa-calendar-check"></i> <span>Attendance</span></a>
            <a href="#" class="nav-link" data-view="fees"><i class="fas fa-wallet"></i> <span>Fees</span></a>
            <a href="#" class="nav-link" data-view="exams"><i class="fas fa-graduation-cap"></i> <span>Exams</span></a>
            <a href="#" class="nav-link" data-view="staff"><i class="fas fa-user-tie"></i> <span>Staff Tracker</span></a>
            <a href="#" class="nav-link" data-view="events"><i class="fas fa-calendar-day"></i> <span>Events</span></a>
            <a href="#" class="nav-link" data-view="alerts"><i class="fas fa-bell"></i> <span>Alerts</span></a>
        </nav>
    </aside>

    <main>
        <header>
            <div class="header-left">
                <button id="mobile-toggle"><i class="fas fa-bars"></i></button>
                <h2 id="view-title">Dashboard</h2>
            </div>
            <div class="header-right">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" placeholder="Global search...">
                </div>
                <div class="profile-area">
                    <div class="notif"><i class="fas fa-bell"></i><span class="dot"></span></div>
                    <img src="https://ui-avatars.com/api/?name=Admin&background=4361ee&color=fff" alt="Admin">
                </div>
            </div>
        </header>

        <div id="content-area" class="fade-in">
            </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="script.js"></script>
</body>
</html>
